openapi: 3.0.3
info:
  title: konkui Central-API Webhook (konkui-side, v1)
  description: |
    Webhook endpoint konkui exposes for Central API (CA) to deliver inbound LINE events
    as the enriched, normalized envelope.

    **Base URL:** `https://service.eeccollege.com` (prod) / `https://testservice.eeccollege.com` (dev).

    **Path:** `/webhooks/central-api` — unchanged from the legacy raw-passthrough
    integration. Only the body shape changes.

    **Auth:** HMAC headers (`X-Timestamp` + `X-Signature`) signed with `WebhookSecret`.
    No `X-Api-Secret` on this direction. (Transition: konkui also accepts the legacy
    `X-Api-Key` until CA confirms HMAC live — see partner addendum.)

    See `../../../STANDARDS.md` + `../../../envelope/skeleton.md` for shared rules.
  version: "1.0.0"
  contact:
    name: Phanu (konkui)
    email: eecprogrammer@gmail.com

servers:
  - url: https://service.eeccollege.com
    description: Production
  - url: https://testservice.eeccollege.com
    description: Development / integration test

paths:
  /webhooks/central-api:
    post:
      operationId: receiveCentralApiEvent
      summary: CA delivers a LINE event batch to konkui
      description: |
        Each call delivers one batch of events. konkui dedups on `message.id` (message
        events) / `webhookEventId` (non-message events) for ≥ 24h.

        **Ownership routing (CA side):** forward `message`/`postback` only for konkui-claimed
        userIds; `follow`/`unfollow` always. See partner addendum.

        **Retry policy (CA side):** on `5xx`, retry up to 3 times with exponential backoff;
        on `4xx`, do not retry.
      security:
        - hmacTimestamp: []
          hmacSignature: []
      parameters:
        - name: X-Timestamp
          in: header
          required: true
          schema: { type: string, example: "1747008300" }
        - name: X-Signature
          in: header
          required: true
          schema: { type: string, example: "a3f5..." }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CentralWebhookEnvelope" }
      responses:
        "200":
          description: All events accepted (some may be dedup-skipped or ownership-filtered — still 200)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookAccepted" }
        "400":
          description: Invalid JSON, empty events array, or other payload error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: HMAC validation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    hmacTimestamp:
      type: apiKey
      in: header
      name: X-Timestamp
    hmacSignature:
      type: apiKey
      in: header
      name: X-Signature

  schemas:
    CentralWebhookEnvelope:
      type: object
      required: [destination, events]
      properties:
        destination:
          type: string
          example: "line-oa-main"
          description: OA identifier. Future multi-OA uses this as the oaKey.
        events:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEvent" }

    WebhookEvent:
      type: object
      required: [type, timestamp, source]
      properties:
        type:
          type: string
          enum: [message, postback, follow, unfollow]
          description: Consumer must ignore unknown (additive). message/postback require source claim; follow/unfollow always forwarded.
          example: "message"
        timestamp:
          type: integer
          format: int64
          description: Unix milliseconds (LINE native — differs from `X-Timestamp` which is seconds).
          example: 1747008300000
        webhookEventId:
          type: string
          nullable: true
          description: LINE event id. Dedup key for non-message events. Stable across retries.
          example: "01H..."
        replyToken:
          type: string
          nullable: true
          description: Present on message/postback only. ~1 min validity, single use.
          example: "abc123..."
        source: { $ref: "#/components/schemas/WebhookSource" }
        message: { $ref: "#/components/schemas/WebhookMessage" }
        postback: { $ref: "#/components/schemas/WebhookPostback" }

    WebhookSource:
      type: object
      required: [type, userId]
      properties:
        type:
          type: string
          enum: [user]
          description: Only "user" forwarded. Group/room sources are dropped by CA.
          example: "user"
        userId:
          type: string
          description: LINE userId. konkui routing key.
          example: "U5992abc..."
        displayName:
          type: string
          nullable: true
          description: CA enriches via LINE GET /profile before forwarding.
          example: "สมชาย ใจดี"
        pictureUrl:
          type: string
          nullable: true
          description: CA enriches.
          example: "https://profile.line-scdn.net/..."
        statusMessage: { type: string, nullable: true }
        language: { type: string, nullable: true, example: "th" }

    WebhookMessage:
      type: object
      description: Present when type=message.
      required: [id, type]
      properties:
        id:
          type: string
          description: LINE message id. Dedup key. CA MUST keep stable across retries.
          example: "line-msg-123"
        type:
          type: string
          enum: [text, image, video, audio, file, sticker, location]
          example: "text"
        text: { type: string, nullable: true, description: "type=text" }
        fileName: { type: string, nullable: true, description: "file/image" }
        contentType: { type: string, nullable: true, description: "media" }
        fileSize: { type: integer, format: int64, nullable: true, description: "file" }
        duration: { type: integer, nullable: true, description: "video/audio, ms" }
        packageId: { type: string, nullable: true, description: "sticker" }
        stickerId: { type: string, nullable: true, description: "sticker" }
        keywords:
          type: array
          nullable: true
          items: { type: string }
          description: "sticker"
        title: { type: string, nullable: true, description: "location" }
        address: { type: string, nullable: true, description: "location" }
        latitude: { type: number, format: double, nullable: true, description: "location" }
        longitude: { type: number, format: double, nullable: true, description: "location" }

    WebhookPostback:
      type: object
      description: Present when type=postback.
      required: [data]
      properties:
        data: { type: string, example: "show:menu" }
        params:
          type: object
          nullable: true
          properties:
            date: { type: string, nullable: true }
            time: { type: string, nullable: true }
            datetime: { type: string, nullable: true }

    WebhookAccepted:
      type: object
      required: [responseCode]
      properties:
        responseCode: { type: string, example: "200" }
        responseMesg: { type: string, example: "OK" }

    ErrorResponse:
      type: object
      required: [responseCode]
      properties:
        responseCode: { type: string }
        responseMesg: { type: string, nullable: true }
