openapi: 3.0.3
info:
  title: StudentCare API (SC-side, v1)
  description: |
    Endpoints the StudentCare backend implements. Consumed by konkui.

    **Base URL:** SC team provides their prod/dev base URLs out-of-band.

    **Auth:** Every request carries `X-Api-Secret`. Inbound POST also carries `X-Timestamp` + `X-Signature` (HMAC with `InboundSecret`).

    See `auth/hmac.md` + `auth/api-secret.md` for security details. See `STANDARDS.md` for non-negotiable rules.
  version: "1.3.0"
  contact:
    name: Phanu (konkui)

servers:
  - url: https://studentcare.example
    description: Placeholder — SC provides the real prod/dev base URLs out-of-band

security:
  - apiSecret: []

paths:
  /api/advisors/{externalUserId}/students:
    get:
      operationId: listAdvisorStudents
      summary: List students (with parent contacts) under an advisor
      description: |
        konkui sends the advisor's `externalUserId` (teacher code). SC resolves the
        teacher↔student mapping from its master data and returns the student roster
        for that advisor, each entry including parent contact info.

        konkui is display-only — it does not maintain teacher↔student mapping
        (see `STANDARDS.md` §11).
      parameters:
        - name: externalUserId
          in: path
          required: true
          description: konkui's external user id of the advisor — matches a teacher code SC can resolve to a student roster.
          schema: { type: string, example: "T67001" }
        - name: academicYear
          in: query
          required: false
          description: Buddhist academic year (e.g., `2568`). Omit = SC's current academic year.
          schema: { type: string, example: "2568" }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdvisorStudentList" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Advisor not found (externalUserId does not resolve to any teacher in SC master data)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/chat/admin/threads:
    get:
      operationId: listAllChatThreadsAdmin
      summary: List every chat room across every advisor (v2 admin view)
      description: |
        Same shape as `/api/chat/advisors/{teacherNo}/threads` but **no TeacherNo filter** —
        returns rooms across all advisors. Each row carries its own `teacherNo`. Use for
        admin dashboards / supervisor monitoring. Parent identity still hidden.
      parameters:
        - name: academicYear
          in: query
          required: false
          schema: { type: string, example: "2568" }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminChatListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/chat/advisors/{teacherNo}/threads:
    get:
      operationId: listAdvisorChatThreads
      summary: List chat rooms for an advisor (v2 — keyed by TeacherNo)
      description: |
        v2 Chat List — 1 row = 1 room. Each `stdNo` may have up to 2 rooms (student + parent).
        Parent identity is **hidden** — `displayLabel` and `senderLabel` use the canonical phrase
        `"ผู้ปกครองของนักศึกษา{fullName}"`. KonKui never receives parent name/phone/email/lineId.
        `stdInfo` is embedded (cache TTL 10 min on SC side) so KonKui does not need to call Dashboard separately.
      parameters:
        - name: teacherNo
          in: path
          required: true
          description: Advisor teacher code (matches SC's denormalized `ChatThread.TeacherNo`).
          schema: { type: string, example: "T67001" }
        - name: academicYear
          in: query
          required: false
          description: Buddhist year tag echoed back in response. Optional.
          schema: { type: string, example: "2568" }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdvisorChatListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/chat/advisors/{teacherNo}/students/{stdNo}/messages:
    get:
      operationId: listAdvisorChatRoomMessages
      summary: List messages in a single chat room (v2)
      description: |
        v2 Chat Room — single room identified by `(teacherNo, stdNo, role)`. Returns full `stdInfo`
        + messages with `senderRole` / `senderLabel` / `isFromAdvisor`. Parent identity hidden.
        SC enforces cross-tenant guard: returns 403 if caller's `teacherNo` does not match the
        thread's denormalized advisor.
      parameters:
        - name: teacherNo
          in: path
          required: true
          schema: { type: string, example: "T67001" }
        - name: stdNo
          in: path
          required: true
          schema: { type: string, example: "67100001" }
        - name: role
          in: query
          required: true
          description: Room discriminator.
          schema: { type: string, enum: ["student", "parent"] }
        - name: take
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatRoomResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: TeacherNo does not match thread advisor (cross-tenant).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Thread not found for `(stdNo, role)`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/chat/threads:
    get:
      operationId: listThreads
      deprecated: true
      summary: (Deprecated v1.3) List chat threads for a student — use /api/chat/advisors/{teacherNo}/threads
      parameters:
        - name: stdNo
          in: query
          required: true
          description: Student number
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudentCareThreadList" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/chat/threads/{threadId}/messages:
    get:
      operationId: listMessages
      deprecated: true
      summary: (Deprecated v1.3) List messages in a thread — use /api/chat/advisors/{teacherNo}/students/{stdNo}/messages
      parameters:
        - name: threadId
          in: path
          required: true
          description: |
            Thread identifier in canonical string form `SC-{int}` (e.g., `SC-12345`).
            Matches the value SC emits in outbound webhook `replyInfo.threadId` and the value konkui must echo in inbound POST.
          schema:
            type: string
            pattern: "^SC-[0-9]+$"
            example: "SC-12345"
        - name: sinceMessageId
          in: query
          required: false
          description: Return messages with id strictly greater than this. For incremental polling.
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudentCareMessageList" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/chat/external/attachment/{attachmentId}:
    get:
      operationId: getAttachment
      summary: Stream an attachment file as binary
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Binary file stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
            "*/*":
              schema: { type: string, format: binary }
          headers:
            Content-Disposition:
              schema: { type: string, example: 'attachment; filename="homework.pdf"' }
            Content-Type:
              schema: { type: string, example: "application/pdf" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /webhook/chat/inbound:
    post:
      operationId: sendInbound
      summary: Receive an advisor reply from konkui
      description: |
        konkui posts an advisor's reply here. SC stores the message in the thread.

        **Auth:** `X-Api-Secret` + HMAC headers (`X-Timestamp` + `X-Signature`) signed with `InboundSecret`.

        **Idempotency:** Dedup on `externalMessageId`. SC SHOULD return 200 with the same `receivedMessageId` for duplicate requests.
      security:
        - apiSecret: []
          hmacTimestamp: []
          hmacSignature: []
      parameters:
        - name: X-Timestamp
          in: header
          required: true
          schema: { type: string, example: "1747008300" }
        - name: X-Signature
          in: header
          required: true
          schema: { type: string, example: "a3f5..." }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StudentCareInboundRequest" }
      responses:
        "200":
          description: Message accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudentCareInboundResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Duplicate (same `externalMessageId` with different body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: Validation failed (e.g., attachment too large, > 5 attachments)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    apiSecret:
      type: apiKey
      in: header
      name: X-Api-Secret
      description: 64-char hex string. Shared secret. See `auth/api-secret.md`.
    hmacTimestamp:
      type: apiKey
      in: header
      name: X-Timestamp
      description: Unix seconds. See `auth/hmac.md`.
    hmacSignature:
      type: apiKey
      in: header
      name: X-Signature
      description: Lowercase hex HMAC-SHA256. See `auth/hmac.md`.

  schemas:
    AdvisorStudentList:
      type: object
      required: [advisor, students, page, size, total]
      properties:
        advisor:
          $ref: "#/components/schemas/AdvisorInfo"
        students:
          type: array
          items: { $ref: "#/components/schemas/AdvisorStudent" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 50 }
        total: { type: integer, example: 32 }
        academicYear:
          type: string
          nullable: true
          example: "2568"
          description: Buddhist academic year SC used to resolve the roster.

    AdvisorInfo:
      type: object
      required: [externalUserId]
      properties:
        externalUserId:
          type: string
          example: "T67001"
          description: Teacher code echoed back from request.
        fullName: { type: string, nullable: true, example: "นายสมศักดิ์ ใจดี" }
        department: { type: string, nullable: true, example: "สามัญ" }
        title: { type: string, nullable: true, example: "ครูที่ปรึกษา ม.4/1" }

    AdvisorStudent:
      type: object
      required: [stdNo]
      properties:
        stdNo: { type: string, example: "67100001" }
        fullName: { type: string, nullable: true, example: "นายสมชาย ใจดี" }
        nickname: { type: string, nullable: true, example: "ชาย" }
        level: { type: string, nullable: true, example: "ม.4", description: "Grade level." }
        classRoom: { type: string, nullable: true, example: "ม.4/1", description: "Class+room label as displayed." }
        photoUrl:
          type: string
          nullable: true
          description: Absolute or SC-relative URL to student photo. konkui may proxy or display directly.
        status:
          type: string
          nullable: true
          enum: [active, leave, dropped, graduated, transferred, other]
          description: Student enrollment status as of `academicYear`. Unknown values coerced to `other`.
        parents:
          type: array
          items: { $ref: "#/components/schemas/ParentContact" }

    ParentContact:
      type: object
      required: [relation]
      properties:
        relation:
          type: string
          enum: [father, mother, guardian, other]
          example: "mother"
        fullName: { type: string, nullable: true, example: "นางสมศรี ใจดี" }
        phone:
          type: string
          nullable: true
          example: "0812345678"
          description: E.164 or Thai 10-digit form. konkui treats as opaque string.
        lineId: { type: string, nullable: true }
        email: { type: string, nullable: true, format: email }
        isPrimary:
          type: boolean
          nullable: true
          description: If true, this contact is the default for advisor outreach. At most one parent per student SHOULD be marked primary.

    StudentCareThreadList:
      type: object
      required: [threads, page, size, total]
      properties:
        threads:
          type: array
          items: { $ref: "#/components/schemas/StudentCareThread" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 20 }
        total: { type: integer, example: 47 }

    StudentCareThread:
      type: object
      required: [threadId, stdNo]
      properties:
        threadId:
          type: string
          pattern: "^SC-[0-9]+$"
          example: "SC-12345"
          description: "Canonical thread ID emitted by StudentCare in form `SC-{int}`."
        stdNo: { type: string, example: "67100001" }
        displayName: { type: string, nullable: true }
        lastMessage: { type: string, nullable: true }
        lastMessageAt: { type: string, format: date-time, nullable: true }
        unreadCount: { type: integer, minimum: 0, example: 2 }

    StudentCareMessageList:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/StudentCareMessage" }

    StudentCareMessage:
      type: object
      required: [id, threadId, isFromTeacher, sentAt, attachments]
      properties:
        id: { type: integer, format: int64, example: 9001 }
        threadId:
          type: string
          pattern: "^SC-[0-9]+$"
          example: "SC-12345"
          description: "Canonical thread ID emitted by StudentCare in form `SC-{int}`."
        body: { type: string, nullable: true }
        isFromTeacher: { type: boolean }
        senderName: { type: string, nullable: true }
        sentAt: { type: string, format: date-time }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/StudentCareAttachment" }

    StudentCareAttachment:
      type: object
      required: [id]
      properties:
        id: { type: integer, format: int64 }
        fileName: { type: string, nullable: true }
        contentType: { type: string, nullable: true }
        url:
          type: string
          nullable: true
          description: Relative path to GET /api/chat/external/attachment/{id}

    StudentCareInboundRequest:
      type: object
      description: |
        Routing: provide **either** v2 keys `(teacherNo, stdNo, role)` **or** legacy `threadId`.
        v2 takes precedence when both `stdNo` and `role` are present.
      properties:
        externalMessageId:
          type: string
          nullable: true
          description: konkui's stable ID for idempotency dedup. SHOULD be present.
        threadId:
          type: string
          nullable: true
          pattern: "^SC-[0-9]+$"
          example: "SC-12345"
          description: "(Legacy v1) Echo back the same `SC-{int}` value SC sent in outbound webhook `replyInfo.threadId`."
        teacherNo:
          type: string
          nullable: true
          description: "(v2) Advisor teacher code — must match thread's denormalized TeacherNo (cross-tenant guard, 403 on mismatch)."
        stdNo:
          type: string
          nullable: true
          description: "(v2) Student number. Required when using v2 routing."
        role:
          type: string
          nullable: true
          enum: ["student", "parent"]
          description: "(v2) Room discriminator. Required when using v2 routing."
        advisorId: { type: string, nullable: true }
        advisorName: { type: string, nullable: true }
        body: { type: string, nullable: true }
        attachments:
          type: array
          maxItems: 5
          items: { $ref: "#/components/schemas/StudentCareInboundAttachment" }

    AdvisorChatListResponse:
      type: object
      required: [teacherNo, threads, page, size, total]
      properties:
        teacherNo: { type: string, example: "T67001" }
        academicYear: { type: string, nullable: true, example: "2568" }
        threads:
          type: array
          items: { $ref: "#/components/schemas/ChatThreadRow" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 50 }
        total: { type: integer, example: 47 }

    AdminChatListResponse:
      type: object
      required: [threads, page, size, total]
      properties:
        academicYear: { type: string, nullable: true, example: "2568" }
        threads:
          type: array
          items: { $ref: "#/components/schemas/ChatThreadRow" }
        page: { type: integer, example: 1 }
        size: { type: integer, example: 50 }
        total: { type: integer, example: 213 }

    ChatThreadRow:
      type: object
      required: [stdNo, role, displayLabel, unreadCount]
      properties:
        stdNo: { type: string, example: "67100001" }
        teacherNo:
          type: string
          nullable: true
          description: Advisor owning this room. Null if TeacherNo not yet resolved by SC background job.
          example: "T67001"
        role: { type: string, enum: ["student", "parent"] }
        displayLabel:
          type: string
          description: |
            student → student's full name; parent → "ผู้ปกครองของนักศึกษา{fullName}".
            Parent identity is NEVER returned — only the canonical label.
          example: "ผู้ปกครองของนักศึกษานายสมชาย ใจดี"
        stdInfo:
          allOf: [{ $ref: "#/components/schemas/StdInfoBrief" }]
          nullable: true
        lastMessage:
          allOf: [{ $ref: "#/components/schemas/LastMessage" }]
          nullable: true
        unreadCount: { type: integer, example: 2 }

    StdInfoBrief:
      type: object
      properties:
        fullName: { type: string, nullable: true, example: "นายสมชาย ใจดี" }
        classRoom: { type: string, nullable: true, example: "ม.4/1" }
        photoUrl: { type: string, nullable: true, format: uri }

    StdInfoFull:
      type: object
      properties:
        fullName: { type: string, nullable: true }
        nickname: { type: string, nullable: true }
        level: { type: string, nullable: true, example: "ม.4" }
        classRoom: { type: string, nullable: true, example: "ม.4/1" }
        photoUrl: { type: string, nullable: true, format: uri }
        status: { type: string, nullable: true, enum: ["active", "leave", "dropped", "graduated", "transferred", "other"] }

    LastMessage:
      type: object
      properties:
        text: { type: string, nullable: true }
        sentAt: { type: string, format: date-time, nullable: true }
        senderRole: { type: string, nullable: true, enum: ["student", "parent", "advisor"] }
        senderLabel:
          type: string
          nullable: true
          description: |
            parent → "ผู้ปกครองของนักศึกษา{fullName}" (no identity leak); student/advisor → display name.
        isFromAdvisor:
          type: boolean
          description: "true if the advisor sent it (convenience for KonKui bubble alignment)."

    ChatRoomResponse:
      type: object
      required: [teacherNo, stdNo, role, displayLabel, messages]
      properties:
        teacherNo: { type: string }
        stdNo: { type: string }
        role: { type: string, enum: ["student", "parent"] }
        displayLabel: { type: string }
        stdInfo:
          allOf: [{ $ref: "#/components/schemas/StdInfoFull" }]
          nullable: true
        messages:
          type: array
          items: { $ref: "#/components/schemas/ChatMessageV2" }

    ChatMessageV2:
      type: object
      required: [id, senderRole, senderLabel, isFromAdvisor, sentAt]
      properties:
        id: { type: integer, format: int64 }
        senderRole: { type: string, enum: ["student", "parent", "advisor"] }
        senderLabel:
          type: string
          description: parent → "ผู้ปกครองของนักศึกษา{fullName}"; student/advisor → display name.
        isFromAdvisor: { type: boolean }
        body: { type: string, nullable: true }
        sentAt: { type: string, format: date-time }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/ChatAttachmentV2" }

    ChatAttachmentV2:
      type: object
      required: [id, fileName, url]
      properties:
        id: { type: integer, format: int64 }
        fileName: { type: string }
        contentType: { type: string, nullable: true }
        sizeBytes: { type: integer, format: int64 }
        isImage: { type: boolean }
        url:
          type: string
          description: Relative path to GET /api/chat/external/attachment/{id} (auth X-Api-Secret).

    StudentCareInboundAttachment:
      type: object
      required: [fileName, contentType, base64Data]
      properties:
        fileName: { type: string }
        contentType: { type: string }
        base64Data:
          type: string
          description: Base64-encoded file bytes. Decoded size MUST be ≤ 25 MB.

    StudentCareInboundResponse:
      type: object
      required: [responseCode]
      properties:
        responseCode: { type: string, example: "200" }
        responseMesg: { type: string, nullable: true }
        receivedMessageId:
          type: integer
          format: int64
          nullable: true
          description: SC's assigned message ID after storage.

    ErrorResponse:
      type: object
      required: [responseCode]
      properties:
        responseCode: { type: string, description: "HTTP status as string" }
        responseMesg: { type: string, nullable: true, description: "Human-readable reason. No PII, no stack traces." }

  responses:
    Unauthorized:
      description: HMAC or X-Api-Secret failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { responseCode: "401", responseMesg: "signature mismatch" }
    BadRequest:
      description: Payload invalid
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { responseCode: "400", responseMesg: "missing required field: threadId" }
    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { responseCode: "404", responseMesg: "thread not found" }
