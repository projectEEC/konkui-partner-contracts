openapi: 3.0.3
info:
  title: konkui Central-API Webhook (konkui-side, v1)
  description: |
    Webhook endpoint konkui exposes for Central API (CA) to deliver inbound LINE events
    as the enriched, normalized envelope.

    **Base URL:** konkui provides the prod/dev base URLs out-of-band at integration time.

    **Path:** `/webhooks/central-api` — unchanged from the legacy raw-passthrough
    integration. Only the body shape changes.

    **Auth:** HMAC headers (`X-Timestamp` + `X-Signature`) signed with `WebhookSecret`.
    No `X-Api-Secret` on this direction. (Transition: konkui also accepts the legacy
    `X-Api-Key` until CA confirms HMAC live — see partner addendum.)

    See `../../../STANDARDS.md` + `../../../envelope/skeleton.md` for shared rules.
  version: "1.0.0"
  contact:
    name: Phanu (konkui)

servers:
  - url: https://konkui.example
    description: Placeholder — konkui provides the real prod/dev base URLs out-of-band

paths:
  /webhooks/central-api:
    post:
      operationId: receiveCentralApiEvent
      summary: CA delivers a LINE event batch to konkui
      description: |
        Each call delivers one batch of events. konkui dedups on `message.id` (message
        events) / `webhookEventId` (non-message events) for ≥ 24h.

        Which events CA chooses to send (filtering / ownership) is CA's design — not
        specified here. konkui records whatever arrives in this shape.

        **Retry policy (CA side):** on `5xx`, retry up to 3 times with exponential backoff;
        on `4xx`, do not retry.

        **Error reporting (MANDATORY — see `STANDARDS.md` §4 + `envelope/skeleton.md` rule 5):**
        konkui MUST NOT return `200` when it failed to process the batch. A `200` tells CA
        "stop retrying", so returning it on error silently drops events.

        | Situation | HTTP | Body |
        |---|---|---|
        | All events accepted (incl. dedup) | `200` | `WebhookAccepted` |
        | Some accepted, some failed | `200` | `WebhookAccepted` with `failures[]` populated |
        | Invalid JSON / empty `events` / schema violation | `400` | `ErrorResponse` + `errorCode` |
        | HMAC fail / timestamp skew / replay | `401` | `ErrorResponse` + `errorCode` |
        | konkui internal error (DB / dedup store down, unhandled) | `5xx` | `ErrorResponse` + `errorCode` |

        `responseMesg` is human-readable (no PII, no stack trace); `errorCode` is machine-readable
        for CA's alerting / retry. Unknown failure → `INTERNAL_ERROR` + 500.
      security:
        - hmacTimestamp: []
          hmacSignature: []
      parameters:
        - name: X-Timestamp
          in: header
          required: true
          schema: { type: string, example: "1747008300" }
        - name: X-Signature
          in: header
          required: true
          schema: { type: string, example: "a3f5..." }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CentralWebhookEnvelope" }
      responses:
        "200":
          description: |
            Batch accepted (some events may be dedup-skipped or individually failed — still 200,
            with `failures[]` populated if any event failed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookAccepted" }
        "400":
          description: "Invalid JSON, empty events array, or schema violation. `errorCode` REQUIRED."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: "HMAC validation failed — bad signature, timestamp skew (>300s), or replay. `errorCode` REQUIRED."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "500":
          description: "konkui internal error — DB / dedup store down, unhandled exception. CA retries. `errorCode` REQUIRED."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: "konkui temporarily unavailable. CA retries. `errorCode` REQUIRED. Set `Retry-After` when possible."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  securitySchemes:
    hmacTimestamp:
      type: apiKey
      in: header
      name: X-Timestamp
    hmacSignature:
      type: apiKey
      in: header
      name: X-Signature

  schemas:
    CentralWebhookEnvelope:
      type: object
      required: [destination, events]
      properties:
        destination:
          type: string
          example: "line-oa-main"
          description: OA identifier. Future multi-OA uses this as the oaKey.
        events:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEvent" }

    WebhookEvent:
      type: object
      required: [type, timestamp, source]
      properties:
        type:
          type: string
          enum: [message, postback, follow, unfollow]
          description: Consumer must ignore unknown (additive).
          example: "message"
        timestamp:
          type: integer
          format: int64
          description: Unix milliseconds (LINE native — differs from `X-Timestamp` which is seconds).
          example: 1747008300000
        webhookEventId:
          type: string
          nullable: true
          description: LINE event id. Dedup key for non-message events. Stable across retries.
          example: "01H..."
        replyToken:
          type: string
          nullable: true
          description: Present on message/postback only. ~1 min validity, single use.
          example: "abc123..."
        source: { $ref: "#/components/schemas/WebhookSource" }
        message: { $ref: "#/components/schemas/WebhookMessage" }
        postback: { $ref: "#/components/schemas/WebhookPostback" }

    WebhookSource:
      type: object
      required: [type, userId]
      properties:
        type:
          type: string
          enum: [user]
          description: Only "user" forwarded. Group/room sources are dropped by CA.
          example: "user"
        userId:
          type: string
          description: LINE userId. konkui routing key.
          example: "U5992abc..."
        displayName:
          type: string
          nullable: true
          description: CA enriches via LINE GET /profile before forwarding.
          example: "สมชาย ใจดี"
        pictureUrl:
          type: string
          nullable: true
          description: CA enriches.
          example: "https://profile.line-scdn.net/..."
        statusMessage: { type: string, nullable: true }
        language: { type: string, nullable: true, example: "th" }

    WebhookMessage:
      type: object
      description: Present when type=message.
      required: [id, type]
      properties:
        id:
          type: string
          description: LINE message id. Dedup key. CA MUST keep stable across retries.
          example: "line-msg-123"
        type:
          type: string
          enum: [text, image, video, audio, file, sticker, location]
          example: "text"
        text: { type: string, nullable: true, description: "type=text" }
        fileName: { type: string, nullable: true, description: "file/image" }
        contentType: { type: string, nullable: true, description: "media" }
        fileSize: { type: integer, format: int64, nullable: true, description: "file" }
        duration: { type: integer, nullable: true, description: "video/audio, ms" }
        packageId: { type: string, nullable: true, description: "sticker" }
        stickerId: { type: string, nullable: true, description: "sticker" }
        keywords:
          type: array
          nullable: true
          items: { type: string }
          description: "sticker"
        title: { type: string, nullable: true, description: "location" }
        address: { type: string, nullable: true, description: "location" }
        latitude: { type: number, format: double, nullable: true, description: "location" }
        longitude: { type: number, format: double, nullable: true, description: "location" }

    WebhookPostback:
      type: object
      description: Present when type=postback.
      required: [data]
      properties:
        data: { type: string, example: "show:menu" }
        params:
          type: object
          nullable: true
          properties:
            date: { type: string, nullable: true }
            time: { type: string, nullable: true }
            datetime: { type: string, nullable: true }

    WebhookAccepted:
      type: object
      required: [responseCode]
      properties:
        responseCode: { type: string, example: "200" }
        responseMesg: { type: string, example: "OK" }
        accepted:
          type: integer
          nullable: true
          description: Count of events fully processed.
          example: 3
        deduplicated:
          type: integer
          nullable: true
          description: Count of events skipped due to dedup. Still success.
          example: 0
        failures:
          type: array
          nullable: true
          description: |
            Per-event failures inside an otherwise-accepted batch. Populated when ≥1 event failed
            but the batch was processed. Empty/null → all events OK. (Never use this to report a
            whole-request failure — that is a non-2xx, see `ErrorResponse`.)
          items: { $ref: "#/components/schemas/WebhookEventFailure" }

    WebhookEventFailure:
      type: object
      required: [errorCode]
      description: Per-event failure reported in a 200 response with partial success.
      properties:
        messageId:
          type: string
          nullable: true
          description: "`message.id` (or `webhookEventId`) of the failed event."
          example: "line-msg-123"
        errorCode:
          type: string
          description: "Machine-readable category. See `KonKuiErrorCode`."
          example: "SCHEMA_VIOLATION"
        errorMesg:
          type: string
          nullable: true
          description: Human-readable detail. No PII, no stack trace.

    ErrorResponse:
      type: object
      required: [responseCode, errorCode]
      properties:
        responseCode:
          type: string
          description: Mirrors HTTP status as string.
          example: "401"
        errorCode:
          $ref: "#/components/schemas/KonKuiErrorCode"
        responseMesg:
          type: string
          nullable: true
          description: Human-readable detail for ops/devs. No PII, no stack trace. One sentence.

    KonKuiErrorCode:
      type: string
      description: |
        Shared base set of konkui-side webhook error categories (per `envelope/skeleton.md` →
        "Base errorCode set"). REQUIRED on every non-2xx. Add new values as additive minor bumps.
        Unknown value → CA treats as `INTERNAL_ERROR`.
      enum:
        - HMAC_INVALID            # signature mismatch / missing headers
        - TIMESTAMP_SKEW          # X-Timestamp outside ±300s
        - REPLAY_DETECTED         # signature seen recently
        - INVALID_JSON            # body did not parse
        - SCHEMA_VIOLATION        # parsed but failed required-field / type / enum
        - EMPTY_EVENTS            # events[] missing or zero-length
        - UNSUPPORTED_EVENT_TYPE  # unknown type AND konkui chose to reject (default: ignore)
        - DEDUP_STORE_DOWN        # cannot check duplicates — safer to 5xx than double-deliver
        - INTERNAL_ERROR          # unhandled exception
        - SERVICE_UNAVAILABLE     # planned maintenance / dependency outage
